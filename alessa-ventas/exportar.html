<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exportar Ventas · Alessa Accesorios</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --brand: #FF2D78; --brand-deep: #9C0E40; --brand-dim: #FFE4EF; --bg: #FFF8FB; --border: #FADADD; --muted: #8C5B6B; --header-bg: #0F0F0F; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #1A0A10; font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .card { background: white; border-radius: 12px; padding: 32px; border: 1px solid var(--border); max-width: 420px; width: 100%; }
  h1 { font-family: 'Fredoka', sans-serif; font-size: 20px; font-weight: 600; background: linear-gradient(90deg, #FF8FB8, #FF2D78); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
  .sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
  label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); display: block; margin-bottom: 4px; }
  input[type="date"] { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: inherit; background: #fafafa; color: #1A0A10; margin-bottom: 16px; }
  input[type="date"]:focus { outline: none; border-color: var(--brand); }
  .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; background: linear-gradient(135deg, var(--brand), var(--brand-deep)); color: white; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; margin-bottom: 8px; }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .status { font-size: 13px; text-align: center; color: var(--muted); min-height: 20px; margin-top: 8px; }
  .status.ok  { color: #15803d; }
  .status.err { color: #dc2626; }
  .back { display: block; text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); text-decoration: none; }
  .back:hover { color: var(--brand); }
  .preview { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; display: none; }
  .preview-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 10px; }
  .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .row .amount { font-weight: 700; color: var(--brand-deep); }
</style>
</head>
<body>
<div class="card">
  <h1>Alessa Accesorios</h1>
  <div class="sub">Exportar ventas y gastos de cualquier día</div>

  <label>Fecha</label>
  <input type="date" id="fecha-input">

  <button class="btn" id="btn-export" onclick="exportar()">Descargar CSV</button>
  <div class="status" id="status"></div>

  <div class="preview" id="preview">
    <div class="preview-title">Resumen del día</div>
    <div id="preview-rows"></div>
  </div>

  <a href="./" class="back">← Volver al dashboard</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyCUAk3Md4ZnVxHtwq1vb3pQexvAytDyRUU",
  authDomain:        "agenda-jorge-d5e8d.firebaseapp.com",
  databaseURL:       "https://agenda-jorge-d5e8d-default-rtdb.firebaseio.com",
  projectId:         "agenda-jorge-d5e8d",
  storageBucket:     "agenda-jorge-d5e8d.firebasestorage.app",
  messagingSenderId: "650957334352",
  appId:             "1:650957334352:web:eb5ee7d4ebf46cf7b62e55"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Preselect yesterday
const ayer = new Date();
ayer.setDate(ayer.getDate() - 1);
const ayerKey = [ayer.getFullYear(), String(ayer.getMonth()+1).padStart(2,'0'), String(ayer.getDate()).padStart(2,'0')].join('-');
document.getElementById('fecha-input').value = ayerKey;

function formatPeso(n) {
  return '$' + Number(n).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

async function exportar() {
  const fecha  = document.getElementById('fecha-input').value;
  const status = document.getElementById('status');
  const btn    = document.getElementById('btn-export');
  if (!fecha) { status.textContent = 'Selecciona una fecha.'; status.className = 'status err'; return; }

  btn.disabled = true;
  status.textContent = 'Conectando con Firebase...';
  status.className = 'status';

  try {
    await firebase.auth().signInAnonymously();

    const [snapV, snapG] = await Promise.all([
      db.ref('alessa/ventas/' + fecha).once('value'),
      db.ref('alessa/gastos/' + fecha).once('value')
    ]);

    const ventas = Object.values(snapV.val() || {});
    const gastos = Object.values(snapG.val() || {});

    if (!ventas.length && !gastos.length) {
      status.textContent = 'No hay datos para esa fecha.';
      status.className = 'status err';
      btn.disabled = false;
      document.getElementById('preview').style.display = 'none';
      return;
    }

    // Build CSV
    const colsV = ['Fecha','Hora','Artículo','Categoría','Precio','Cantidad','Subtotal','Pago','Comisión Clip','Neto Recibido','Cliente','Notas'];
    const rowsV = ventas.map(v => {
      const clip = v.clipComision || 0;
      return [fecha, v.hora, v.articulo, v.categoria, v.precio, v.cantidad, v.subtotal, v.pago, clip.toFixed(2), (v.subtotal - clip).toFixed(2), v.cliente, v.notas]
        .map(c => '"' + String(c ?? '').replace(/"/g, '""') + '"').join(',');
    });

    const colsG = ['Fecha','Hora','Descripción','Monto'];
    const rowsG = gastos.map(g => [
      fecha, g.hora, g.desc, g.monto
    ].map(c => '"' + String(c ?? '').replace(/"/g, '""') + '"').join(','));

    const csv = [
      '=== VENTAS ===',
      colsV.join(','),
      ...rowsV,
      '',
      '=== GASTOS ===',
      colsG.join(','),
      ...rowsG
    ].join('\n');

    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'alessa-ventas-' + fecha + '.csv';
    a.click();
    URL.revokeObjectURL(a.href);

    // Show preview
    const totalVentas = ventas.reduce((s, v) => s + v.subtotal, 0);
    const totalGastos = gastos.reduce((s, g) => s + g.monto, 0);
    const totalClip   = ventas.reduce((s, v) => s + (v.clipComision || 0), 0);
    const utilidad    = (totalVentas * 0.5) - totalGastos - totalClip;
    document.getElementById('preview-rows').innerHTML = [
      ['Total ventas', formatPeso(totalVentas)],
      ['Número de ventas', ventas.length],
      ['Comisión Clip', formatPeso(totalClip)],
      ['Gastos', formatPeso(totalGastos)],
      ['Utilidad neta', formatPeso(utilidad)]
    ].map(([k,v]) => `<div class="row"><span>${k}</span><span class="amount">${v}</span></div>`).join('');
    document.getElementById('preview').style.display = 'block';

    status.textContent = `✓ ${ventas.length} ventas y ${gastos.length} gastos descargados.`;
    status.className = 'status ok';
  } catch(e) {
    status.textContent = 'Error al conectar: ' + e.message;
    status.className = 'status err';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
