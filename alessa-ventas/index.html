<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas · Alessa Accesorios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:      #FF2D78;
    --brand-deep: #9C0E40;
    --brand-mid:  #FF8FB8;
    --brand-dim:  #FFE4EF;
    --bg:         #FFF8FB;
    --card:       #FFFFFF;
    --border:     #FADADD;
    --text:       #1A0A10;
    --muted:      #8C5B6B;
    --header-bg:  #0F0F0F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  header { background: var(--header-bg); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .brand h1 { font-family: 'Fredoka', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: 0.02em; background: linear-gradient(90deg, #FFD6E6, #FF8FB8, #FF2D78); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .brand-sub { font-size: 11px; opacity: 0.5; margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }
  .header-right { text-align: right; }
  .hora-display { font-size: 26px; font-weight: 700; }
  .fecha-display { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .sync-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; opacity: 0.7; margin-top: 4px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
  .sync-dot.offline { background: #f59e0b; }
  .container { max-width: 760px; margin: 24px auto; padding: 0 16px; }
  .card { background: var(--card); border-radius: 10px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
  .card-title { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--brand); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-box.accent { background: linear-gradient(135deg, var(--brand-dim), #FFB8D0); border-color: var(--brand-mid); }
  .stat-box.accent .stat-value { color: var(--brand-deep); }
  .stat-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pago-breakdown { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .pago-pill { flex: 1; min-width: 90px; background: #fafafa; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; text-align: center; }
  .pago-pill-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
  .pago-pill-val { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea { border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; background: #fafafa; color: var(--text); transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--brand); }
  .form-group textarea { resize: vertical; min-height: 56px; }
  .subtotal-display { padding: 8px 10px; border-radius: 6px; background: var(--brand-dim); border: 1px solid var(--brand-mid); font-size: 16px; font-weight: 700; color: var(--brand-deep); }
  .btn-primary { padding: 10px 20px; border-radius: 6px; border: none; background: linear-gradient(135deg, var(--brand), var(--brand-deep)); color: white; font-size: 13px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 4px; transition: opacity 0.15s; font-family: 'DM Sans', sans-serif; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-sm { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: white; color: var(--muted); font-size: 11px; cursor: pointer; font-weight: 500; }
  .btn-sm:hover { background: #f4f4f5; }
  .btn-danger { color: #dc2626; border-color: #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }
  .venta-list { display: flex; flex-direction: column; gap: 8px; }
  .venta-item { background: #fafafa; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; }
  .venta-articulo { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .venta-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; align-items: center; }
  .venta-precio { font-size: 16px; font-weight: 700; color: var(--brand-deep); text-align: right; white-space: nowrap; }
  .venta-hora { font-size: 10px; color: var(--muted); text-align: right; margin-top: 4px; }
  .venta-notas { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .tag-cat  { background: var(--brand-dim); color: var(--brand); }
  .tag-cant { background: #f4f4f5; color: #52525b; }
  .tag-pago { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  .tag-pago.transferencia { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
  .tag-pago.tarjeta { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }
  .empty-state { text-align: center; padding: 36px; color: var(--muted); }
  .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Alessa Accesorios</h1>
    <div class="brand-sub">Control de Ventas</div>
    <div class="sync-badge" id="sync-badge" style="display:none">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Sincronizado</span>
    </div>
  </div>
  <div class="header-right">
    <div class="hora-display" id="hora-actual"></div>
    <div class="fecha-display" id="fecha-actual"></div>
  </div>
</header>
<div class="container">
  <div class="card">
    <div class="card-title">Resumen del Día</div>
    <div class="stats-grid">
      <div class="stat-box accent">
        <div class="stat-label">Total Facturado</div>
        <div class="stat-value" id="stat-total">$0</div>
        <div class="stat-sub" id="stat-articulos">0 artículos</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Ventas</div>
        <div class="stat-value" id="stat-ventas">0</div>
        <div class="stat-sub">transacciones</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Ticket Prom.</div>
        <div class="stat-value" id="stat-ticket">$0</div>
        <div class="stat-sub">por venta</div>
      </div>
    </div>
    <div class="pago-breakdown" id="pago-breakdown"></div>
  </div>
  <div class="card">
    <div class="card-title">Registrar Venta</div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Artículo</label>
        <input type="text" id="f-articulo" placeholder="Ej. Aretes corazón dorado, Pulsera perlas..." autocomplete="off">
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="f-categoria">
          <option value="">— Seleccionar —</option>
          <option>Aretes</option>
          <option>Pulseras</option>
          <option>Collares</option>
          <option>Anillos</option>
          <option>Bolsas</option>
          <option>Cinturones</option>
          <option>Lentes</option>
          <option>Set / Combo</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Método de Pago</label>
        <select id="f-pago">
          <option value="Efectivo">Efectivo</option>
          <option value="Transferencia">Transferencia</option>
          <option value="Tarjeta">Tarjeta</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Precio Unitario ($)</label>
        <input type="number" id="f-precio" placeholder="0.00" min="0" step="0.01" oninput="calcSubtotal()">
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="f-cantidad" value="1" min="1" oninput="calcSubtotal()">
      </div>
      <div class="form-group">
        <label>Subtotal</label>
        <div class="subtotal-display" id="subtotal-display">$0.00</div>
      </div>
      <div class="form-group">
        <label>Cliente (opcional)</label>
        <input type="text" id="f-cliente" placeholder="Nombre del cliente...">
      </div>
      <div class="form-group form-full">
        <label>Notas (opcional)</label>
        <textarea id="f-notas" placeholder="Talla, color, pedido especial, apartar..."></textarea>
      </div>
      <div class="form-group form-full">
        <button class="btn-primary" onclick="registrarVenta()">+ Registrar Venta</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">
      Ventas de Hoy
      <button class="btn-sm" onclick="exportarCSV()">Exportar CSV</button>
    </div>
    <div id="venta-list" class="venta-list">
      <div class="empty-state"><div class="icon">🛍️</div>No hay ventas registradas hoy.</div>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyCUAk3Md4ZnVxHtwq1vb3pQexvAytDyRUU",
  authDomain:        "agenda-jorge-d5e8d.firebaseapp.com",
  databaseURL:       "https://agenda-jorge-d5e8d-default-rtdb.firebaseio.com",
  projectId:         "agenda-jorge-d5e8d",
  storageBucket:     "agenda-jorge-d5e8d.firebasestorage.app",
  messagingSenderId: "650957334352",
  appId:             "1:650957334352:web:eb5ee7d4ebf46cf7b62e55"
};
const FB_READY = true;
let fbDB = null, lastWriteMs = 0, localVentas = [];
const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const ahora = new Date(), diaNum = ahora.getDay();
const fechaKey = [ahora.getFullYear(), String(ahora.getMonth()+1).padStart(2,'0'), String(ahora.getDate()).padStart(2,'0')].join('-');
const storeKey = 'alessa_ventas_' + fechaKey;
try {
  firebase.initializeApp(firebaseConfig);
  firebase.auth().signInAnonymously().then(() => {
    fbDB = firebase.database();
    document.getElementById('sync-badge').style.display = 'inline-flex';
    loadData(() => render());
  }).catch(() => render());
} catch(e) { render(); }
function ventasRef() { return fbDB ? fbDB.ref('alessa/ventas/' + fechaKey) : null; }
function getVentas() { return fbDB ? localVentas : JSON.parse(localStorage.getItem(storeKey)||'[]'); }
function saveVentas(arr) {
  if (fbDB) { localVentas = arr; lastWriteMs = Date.now(); const obj = arr.length ? Object.fromEntries(arr.map(v=>[v.id,v])) : null; ventasRef().set(obj); }
  else localStorage.setItem(storeKey, JSON.stringify(arr));
}
function loadData(cb) {
  if (!fbDB) { cb(); return; }
  ventasRef().once('value', snap => {
    localVentas = Object.values(snap.val()||{});
    cb();
    ventasRef().on('value', snap => { if(Date.now()-lastWriteMs<1000)return; localVentas=Object.values(snap.val()||{}); render(); });
    setSyncStatus(true);
  }, () => { setSyncStatus(false); cb(); });
}
function setSyncStatus(on) {
  document.getElementById('sync-dot').className = 'sync-dot'+(on?'':' offline');
  document.getElementById('sync-label').textContent = on ? 'Sincronizado' : 'Sin conexión';
}
function formatPeso(n) { return '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function escapeHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;'); }
function calcSubtotal() {
  const p = parseFloat(document.getElementById('f-precio').value)||0;
  const q = parseInt(document.getElementById('f-cantidad').value)||1;
  document.getElementById('subtotal-display').textContent = formatPeso(p*q);
}
function registrarVenta() {
  const articulo  = document.getElementById('f-articulo').value.trim();
  const categoria = document.getElementById('f-categoria').value;
  const precio    = parseFloat(document.getElementById('f-precio').value);
  const cantidad  = parseInt(document.getElementById('f-cantidad').value)||1;
  const pago      = document.getElementById('f-pago').value;
  const cliente   = document.getElementById('f-cliente').value.trim();
  const notas     = document.getElementById('f-notas').value.trim();
  if (!articulo) { alert('Escribe el nombre del artículo.'); document.getElementById('f-articulo').focus(); return; }
  if (!precio||precio<=0) { alert('Ingresa un precio válido.'); document.getElementById('f-precio').focus(); return; }
  const now = new Date();
  const hora = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const venta = { id:'v_'+Date.now(), articulo, categoria, precio, cantidad, subtotal:precio*cantidad, pago, cliente, notas, hora };
  const arr = getVentas(); arr.unshift(venta); saveVentas(arr); resetForm(); render();
}
function eliminarVenta(id) { if(!confirm('¿Eliminar esta venta?'))return; saveVentas(getVentas().filter(v=>v.id!==id)); render(); }
function resetForm() {
  ['f-articulo','f-cliente','f-notas'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-categoria').value='';
  document.getElementById('f-precio').value='';
  document.getElementById('f-cantidad').value='1';
  document.getElementById('f-pago').value='Efectivo';
  document.getElementById('subtotal-display').textContent='$0.00';
}
function render() { renderStats(); renderList(); }
function renderStats() {
  const v = getVentas();
  const total = v.reduce((s,x)=>s+x.subtotal,0);
  const arts  = v.reduce((s,x)=>s+x.cantidad,0);
  document.getElementById('stat-total').textContent    = formatPeso(total);
  document.getElementById('stat-ventas').textContent   = v.length;
  document.getElementById('stat-articulos').textContent = arts+' artículo'+(arts!==1?'s':'');
  document.getElementById('stat-ticket').textContent   = formatPeso(v.length?total/v.length:0);
  const pm = {}; v.forEach(x=>{ pm[x.pago]=(pm[x.pago]||0)+x.subtotal; });
  document.getElementById('pago-breakdown').innerHTML = Object.entries(pm).map(([p,t])=>`<div class="pago-pill"><div class="pago-pill-label">${escapeHtml(p)}</div><div class="pago-pill-val">${formatPeso(t)}</div></div>`).join('');
}
function tagPago(p) { const c={Transferencia:'transferencia',Tarjeta:'tarjeta'}; return `<span class="tag tag-pago ${c[p]||''}">${escapeHtml(p)}</span>`; }
function renderList() {
  const v = getVentas(), list = document.getElementById('venta-list');
  if (!v.length) { list.innerHTML='<div class="empty-state"><div class="icon">🛍️</div>No hay ventas registradas hoy.</div>'; return; }
  list.innerHTML = v.map(x=>`
    <div class="venta-item">
      <div>
        <div class="venta-articulo">${escapeHtml(x.articulo)}</div>
        <div class="venta-meta">
          ${x.categoria?`<span class="tag tag-cat">${escapeHtml(x.categoria)}</span>`:''}
          ${tagPago(x.pago)}
          ${x.cantidad>1?`<span class="tag tag-cant">x${x.cantidad}</span>`:''}
          ${x.cliente?`<span style="font-size:12px;color:var(--muted)">👤 ${escapeHtml(x.cliente)}</span>`:''}
        </div>
        ${x.notas?`<div class="venta-notas">${escapeHtml(x.notas)}</div>`:''}
      </div>
      <div>
        <div class="venta-precio">${formatPeso(x.subtotal)}</div>
        <div class="venta-hora">${x.hora}</div>
        <div style="margin-top:8px;text-align:right"><button class="btn-sm btn-danger" onclick="eliminarVenta('${x.id}')">Eliminar</button></div>
      </div>
    </div>`).join('');
}
function exportarCSV() {
  const v = getVentas();
  if (!v.length) { alert('No hay ventas para exportar.'); return; }
  const cols = ['Fecha','Hora','Artículo','Categoría','Precio','Cantidad','Subtotal','Pago','Cliente','Notas'];
  const rows = v.map(x=>[fechaKey,x.hora,x.articulo,x.categoria,x.precio,x.cantidad,x.subtotal,x.pago,x.cliente,x.notas].map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(','));
  const blob = new Blob(['﻿'+[cols.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='alessa-ventas-'+fechaKey+'.csv'; a.click();
}
function actualizarReloj() {
  const n = new Date();
  document.getElementById('hora-actual').textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
actualizarReloj();
setInterval(actualizarReloj, 30000);
document.getElementById('fecha-actual').textContent = DIAS[diaNum]+' '+ahora.getDate()+' de '+MESES[ahora.getMonth()]+' '+ahora.getFullYear();
</script>
</body>
</html>
